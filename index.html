  <script>
    // PWA: 注册 Service Worker（离线可学 + 可安装到主屏）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {/* 离线不可用时不阻断主流程 */});
      });
    }
  </script>
